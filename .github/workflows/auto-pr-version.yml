name: Auto PR For Version Changes

on:
  push:
    branches-ignore:
      - main
    paths:
      - VERSION
      - CHANGELOG.md

permissions:
  contents: read
  pull-requests: write

jobs:
  create-pr:
    runs-on: ubuntu-latest
    steps:
      - name: Create PR if missing
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const head = context.ref.replace('refs/heads/', '');
            const base = 'main';

            const existing = await github.rest.pulls.list({
              owner,
              repo,
              state: 'open',
              head: `${owner}:${head}`,
              base,
              per_page: 1,
            });

            if (existing.data.length > 0) {
              core.info(`Open PR already exists: #${existing.data[0].number}`);
              return;
            }

            const versionRef = await github.rest.repos.getContent({
              owner,
              repo,
              path: 'VERSION',
              ref: head,
            });

            const versionRaw = Buffer.from(versionRef.data.content, 'base64').toString('utf8').trim();

            const pull = await github.rest.pulls.create({
              owner,
              repo,
              head,
              base,
              title: `chore: release ${versionRaw}`,
              body: [
                'Automaticky vytvořený PR pro release změny.',
                '',
                `- Branch: \`${head}\``,
                `- Version: \`${versionRaw}\``,
                '',
                'Zkontrolujte changelog a verze před merge do `main`.'
              ].join('\n'),
            });

            core.info(`Created PR #${pull.data.number}`);
